olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: claudecodeheadless
  icon: https://app.cdn.olares.com/appstore/codeserver/icon.png
  description: Pure headless Claude Code terminal. No web UI — Claude starts on launch and manages its own login and API keys.
  appid: claudecodeheadless
  title: Claude Code (Headless)
  version: '0.1.0'
  categories:
  - Developer Tools
  - Productivity
entrances:
- name: claudecodeheadless
  port: 3000
  host: claudecodeheadless
  title: Claude Code (Headless)
  icon: https://app.cdn.olares.com/appstore/codeserver/icon.png
  openMethod: window
  authLevel: internal
spec:
  versionName: '0.1.0'
  fullDescription: |
    A stripped-down Claude Code variant that launches Claude directly in a web terminal.

    Everything except Claude Code itself has been removed. There is no file tree,
    no session manager, no settings panel, and no pre-configured API keys.
    Claude starts on launch and walks you through login and API key setup
    interactively — exactly as it would in a local terminal.

    Use this variant when you want the raw Claude Code experience on your Olares
    device with zero configuration overhead.

    Features:
    - Instant Claude Code terminal on open — no extra clicks
    - Claude-managed authentication (Anthropic account or API key, your choice)
    - Minimal footprint: smaller image, lower idle memory
    - Persistent home directory: auth and plugins survive restarts

    For the full GUI experience (file tree, session tabs, provider switcher) install
    the standard "Claude Code" app instead.
  upgradeDescription: |
    Initial release.
  developer: trevestforvor
  website: https://code.claude.com/
  sourceCode: https://docs.anthropic.com/en/docs/claude-code
  submitter: trevestforvor
  locale:
  - en-US
  - zh-CN
  doc: https://docs.anthropic.com/en/docs/claude-code
  license:
  - text: Proprietary
    url: https://www.anthropic.com/legal/commercial-terms
  requiredMemory: 256Mi
  limitedMemory: 4Gi
  requiredDisk: 128Mi
  limitedDisk: 4Gi
  requiredCpu: 250m
  limitedCpu: '2'
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
  userData:
  - Home
options:
  allowMultipleInstall: false
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
