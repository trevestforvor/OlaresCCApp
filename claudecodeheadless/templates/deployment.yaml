---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claudecodeheadless
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: claudecodeheadless
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: claudecodeheadless
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: claudecodeheadless
    spec:
      initContainers:
        - name: init-home
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
            - |
              mkdir -p /home/claude/.claude
              chown -R 1001:1001 /home/claude
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-home
              mountPath: /home/claude
      containers:
        - name: claudecodeheadless
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOME
              value: /home/claude
            - name: SHELL
              value: /bin/bash
            - name: TERM
              value: xterm-256color
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: app-home
              mountPath: /home/claude
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      volumes:
        - name: app-home
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/claudecodeheadless'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/claudecodeheadless'
            {{- end }}
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: claudecodeheadless
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: claudecodeheadless
spec:
  type: ClusterIP
  selector:
    io.kompose.service: claudecodeheadless
  ports:
    - name: "3000"
      protocol: TCP
      port: 3000
      targetPort: 3000
