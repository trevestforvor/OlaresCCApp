---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claudecode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: claudecode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: claudecode
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: claudecode
    spec:
      initContainers:
        - name: init-home
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
            - |
              mkdir -p /home/claude/.claude /config /workspace
              chown -R 1000:1000 /home/claude /config /workspace
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-home
              mountPath: /home/claude
            - name: app-config
              mountPath: /config
            - name: user-workspace
              mountPath: /workspace
      containers:
        - name: claudecode
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOME
              value: /home/claude
            - name: SHELL
              value: /bin/bash
            - name: TERM
              value: xterm-256color
            - name: SETTINGS_PATH
              value: /config/settings.json
            - name: WORKSPACE_ROOT
              value: /workspace
            - name: PORT
              value: "3000"
            - name: ANTHROPIC_BASE_URL
              value: {{ .Values.olaresEnv.ANTHROPIC_BASE_URL | default "" | quote }}
            - name: ANTHROPIC_API_KEY
              value: {{ .Values.olaresEnv.ANTHROPIC_API_KEY | default "" | quote }}
            - name: ANTHROPIC_AUTH_TOKEN
              value: {{ .Values.olaresEnv.ANTHROPIC_AUTH_TOKEN | default "" | quote }}
            - name: DEFAULT_MODEL
              value: {{ .Values.olaresEnv.DEFAULT_MODEL | default "" | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: app-home
              mountPath: /home/claude
            - name: app-config
              mountPath: /config
            - name: user-workspace
              mountPath: /workspace
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      volumes:
        - name: app-home
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/claudecode'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/claudecode'
            {{- end }}
            type: DirectoryOrCreate
        - name: app-config
          hostPath:
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}/config'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/claudecode/config'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/claudecode/config'
            {{- end }}
            type: DirectoryOrCreate
        - name: user-workspace
          hostPath:
            path: '{{ .Values.userspace.userData }}'
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: claudecode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: claudecode
spec:
  type: ClusterIP
  selector:
    io.kompose.service: claudecode
  ports:
    - name: "3000"
      protocol: TCP
      port: 3000
      targetPort: 3000
