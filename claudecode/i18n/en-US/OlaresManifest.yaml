metadata:
  title: Claude Code (Headless)
  description: Pure headless Claude Code terminal. Claude starts on launch and manages its own login and API keys.
spec:
  fullDescription: |
    A stripped-down Claude Code variant that launches Claude directly in a web terminal.
    No file tree, no session manager, no settings panel — just Claude.
    Claude handles authentication interactively on first launch.
  upgradeDescription: |
    Initial release.
